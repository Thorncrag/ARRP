<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="680" viewBox="0 0 1000 680" role="img" aria-labelledby="title desc">
  <title id="title">ELEC-015 Maine RCV turnout and alternative vote-expression trend</title>
  <desc id="desc">Two line charts showing alternative vote expression in general elections and voter turnout by election series, with presidential years shaded and 2018 marked as the first year of Maine RCV use.</desc>
  <rect width="1000" height="680" fill="#ffffff"/>
  <text x="80" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Maine Election Participation and Alternative Vote Expression</text>
  <text x="80" y="62" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Alternative vote expression includes non-D/R candidates and official write-in/other columns where Maine tabulates them.</text>

  <g fill="#f3f4f6" opacity="0.65">
    <rect x="147" y="80" width="36" height="530"/>
    <rect x="317" y="80" width="36" height="530"/>
    <rect x="487" y="80" width="36" height="530"/>
    <rect x="657" y="80" width="36" height="530"/>
    <rect x="827" y="80" width="36" height="530"/>
  </g>
  <line x1="590" y1="80" x2="590" y2="610" stroke="#111827" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="598" y="88" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827">RCV first used</text>

  <line x1="80" y1="300" x2="930" y2="300" stroke="#d1d5db" stroke-width="1"/>
  <line x1="80" y1="256" x2="930" y2="256" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="212" x2="930" y2="212" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="168" x2="930" y2="168" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="124" x2="930" y2="124" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="80" x2="930" y2="80" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="80" x2="80" y2="300" stroke="#d1d5db" stroke-width="1"/>
  <text x="80" y="102" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Alternative vote expression</text>
  <text x="39" y="304" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">0%</text>
  <text x="33" y="260" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">5%</text>
  <text x="27" y="216" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">10%</text>
  <text x="27" y="172" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">15%</text>
  <text x="27" y="128" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">20%</text>
  <text x="27" y="84" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">25%</text>

  <polyline fill="none" stroke="#16a34a" stroke-width="3" points="250.0,110.1 420.0,246.0 590.0,98.1 760.0,277.5"/>
  <polyline fill="none" stroke="#dc2626" stroke-width="3" points="165.0,283.2 335.0,275.8 505.0,235.8 675.0,274.6 845.0,281.3"/>
  <g fill="#16a34a">
    <circle cx="250.0" cy="110.1" r="4"/><circle cx="420.0" cy="246.0" r="4"/><circle cx="590.0" cy="98.1" r="4"/><circle cx="760.0" cy="277.5" r="4"/>
  </g>
  <g fill="#dc2626">
    <circle cx="165.0" cy="283.2" r="4"/><circle cx="335.0" cy="275.8" r="4"/><circle cx="505.0" cy="235.8" r="4"/><circle cx="675.0" cy="274.6" r="4"/><circle cx="845.0" cy="281.3" r="4"/>
  </g>
  <text x="84" y="287" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">2006 federal-only row not plotted</text>

  <line x1="80" y1="610" x2="930" y2="610" stroke="#d1d5db" stroke-width="1"/>
  <line x1="80" y1="561.1" x2="930" y2="561.1" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="512.2" x2="930" y2="512.2" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="463.3" x2="930" y2="463.3" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="414.4" x2="930" y2="414.4" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="390" x2="930" y2="390" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="390" x2="80" y2="610" stroke="#d1d5db" stroke-width="1"/>
  <text x="80" y="377" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Voter turnout or turnout proxy</text>
  <text x="31" y="614" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">0</text>
  <text x="24" y="565" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">200k</text>
  <text x="24" y="516" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">400k</text>
  <text x="24" y="467" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">600k</text>
  <text x="24" y="418" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">800k</text>

  <polyline fill="none" stroke="#2563eb" stroke-width="3" points="80.0,584.5 165.0,576.3 250.0,563.5 335.0,577.3 420.0,578.9 505.0,585.9 590.0,552.7 675.0,543.4 760.0,575.8 845.0,573.5 930.0,521.9"/>
  <polyline fill="none" stroke="#16a34a" stroke-width="3" points="250.0,468.1 420.0,459.2 590.0,452.1 760.0,443.6"/>
  <polyline fill="none" stroke="#dc2626" stroke-width="3" points="165.0,431.3 335.0,432.8 505.0,421.3 675.0,407.5 845.0,404.1"/>
  <g fill="#2563eb">
    <circle cx="80.0" cy="584.5" r="4"/><circle cx="165.0" cy="576.3" r="4"/><circle cx="250.0" cy="563.5" r="4"/><circle cx="335.0" cy="577.3" r="4"/><circle cx="420.0" cy="578.9" r="4"/><circle cx="505.0" cy="585.9" r="4"/><circle cx="590.0" cy="552.7" r="4"/><circle cx="675.0" cy="543.4" r="4"/><circle cx="760.0" cy="575.8" r="4"/><circle cx="845.0" cy="573.5" r="4"/><circle cx="930.0" cy="521.9" r="4"/>
  </g>
  <g fill="#16a34a">
    <circle cx="250.0" cy="468.1" r="4"/><circle cx="420.0" cy="459.2" r="4"/><circle cx="590.0" cy="452.1" r="4"/><circle cx="760.0" cy="443.6" r="4"/>
  </g>
  <g fill="#dc2626">
    <circle cx="165.0" cy="431.3" r="4"/><circle cx="335.0" cy="432.8" r="4"/><circle cx="505.0" cy="421.3" r="4"/><circle cx="675.0" cy="407.5" r="4"/><circle cx="845.0" cy="404.1" r="4"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="11" fill="#374151">
    <text x="80.0" y="632" text-anchor="middle">2006</text>
    <text x="250.0" y="632" text-anchor="middle">2010</text>
    <text x="335.0" y="632" text-anchor="middle">2012</text>
    <text x="420.0" y="632" text-anchor="middle">2014</text>
    <text x="505.0" y="632" text-anchor="middle">2016</text>
    <text x="590.0" y="632" text-anchor="middle">2018</text>
    <text x="675.0" y="632" text-anchor="middle">2020</text>
    <text x="760.0" y="632" text-anchor="middle">2022</text>
    <text x="845.0" y="632" text-anchor="middle">2024</text>
    <text x="930.0" y="632" text-anchor="middle">2026</text>
  </g>
  <line x1="80" y1="646" x2="94" y2="646" stroke="#2563eb" stroke-width="3"/><text x="102" y="650" font-family="Arial, sans-serif" font-size="11" fill="#374151">Regular primaries, turnout</text>
  <line x1="250" y1="646" x2="264" y2="646" stroke="#16a34a" stroke-width="3"/><text x="272" y="650" font-family="Arial, sans-serif" font-size="11" fill="#374151">Midterm generals</text>
  <line x1="390" y1="646" x2="404" y2="646" stroke="#dc2626" stroke-width="3"/><text x="412" y="650" font-family="Arial, sans-serif" font-size="11" fill="#374151">Presidential-year generals</text>
</svg>
