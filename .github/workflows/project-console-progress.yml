name: Project Console Progress Bot

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      work_count:
        description: Progress tracking warnings requiring review.
        value: ${{ jobs.refresh.outputs.work_count }}
      output_hash:
        description: SHA-256 of the generated progress projection.
        value: ${{ jobs.refresh.outputs.output_hash }}

concurrency:
  group: project-console-progress
  cancel-in-progress: true

jobs:
  refresh:
    outputs:
      work_count: ${{ steps.chain-result.outputs.work_count }}
      output_hash: ${{ steps.chain-result.outputs.output_hash }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check Project credential configuration
        id: project-auth
        env:
          ARRP_PROJECT_TOKEN: ${{ secrets.ARRP_PROJECT_TOKEN }}
        run: |
          if [ -n "${ARRP_PROJECT_TOKEN}" ]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::ARRP_PROJECT_TOKEN is not configured; Project Console progress refresh is inactive."
          fi

      - name: Check out the repository
        if: steps.project-auth.outputs.configured == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Build Project Console progress data
        if: steps.project-auth.outputs.configured == 'true'
        env:
          ARRP_PROJECT_TOKEN: ${{ secrets.ARRP_PROJECT_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/build_project_console_progress.py
          --config .github/project-console-progress.json
          --registry inventory/github_issue_registry.csv
          --output "${RUNNER_TEMP}/arrp-project-console-progress"

      - name: Publish the generated data branch
        if: steps.project-auth.outputs.configured == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/publish_project_console_progress.py
          --source "${RUNNER_TEMP}/arrp-project-console-progress"
          --repository Thorncrag/ARRP
          --branch project-console-data
          --vercel-config participate/vercel.json

      - name: Expose run-chain result
        id: chain-result
        if: always()
        run: |
          python3 - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          report = Path(os.environ["RUNNER_TEMP"]) / "arrp-project-console-progress" / "progress.json"
          count = 0
          digest = ""
          if report.is_file():
              payload = json.loads(report.read_text())
              for key in ("warnings", "trackingWarnings", "tracking_warnings"):
                  value = payload.get(key)
                  if isinstance(value, list):
                      count += len(value)
              digest = "sha256:" + hashlib.sha256(report.read_bytes()).hexdigest()
          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
              output.write(f"work_count={count}\noutput_hash={digest}\n")
          PY
