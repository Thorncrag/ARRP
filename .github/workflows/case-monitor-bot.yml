name: Case Monitor Bot

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      work_count:
        description: New machine-observed case changes and leads.
        value: ${{ jobs.check.outputs.work_count }}
      output_hash:
        description: SHA-256 of the structured case-monitor report.
        value: ${{ jobs.check.outputs.output_hash }}

concurrency:
  group: arrp-case-monitor-bot
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write # Required only to assign the pull request to the project owner.

jobs:
  check:
    outputs:
      work_count: ${{ steps.chain-result.outputs.work_count }}
      output_hash: ${{ steps.chain-result.outputs.output_hash }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Prepare the deterministic bot branch
        id: branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bot_branch="$(python -c 'import json; print(json.load(open(".github/case-monitor-bot.json"))["automation"]["branch"])')"
          base_branch="$(python -c 'import json; print(json.load(open(".github/case-monitor-bot.json"))["automation"]["baseBranch"])')"
          printf 'BOT_BRANCH=%s\nBASE_BRANCH=%s\n' "${bot_branch}" "${base_branch}" >> "${GITHUB_ENV}"
          git config user.name "arrp-case-monitor[bot]"
          git config user.email "arrp-case-monitor[bot]@users.noreply.github.com"
          git fetch origin "${base_branch}"
          open_pr="$(gh pr list --repo "${GITHUB_REPOSITORY}" --state open --head "${bot_branch}" --json number --jq '.[0].number // empty')"
          if [ -n "${open_pr}" ] && git fetch origin "${bot_branch}:refs/remotes/origin/${bot_branch}" 2>/dev/null; then
            git checkout -B "${bot_branch}" "origin/${bot_branch}"
            git rebase "origin/${base_branch}"
          else
            git checkout -B "${bot_branch}" "origin/${base_branch}"
          fi

      - name: Check cataloged litigation sources
        id: monitor
        continue-on-error: true
        env:
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
        run: >-
          python scripts/check_case_updates.py
          --apply
          --log "${RUNNER_TEMP}/case-monitor-event.md"
          --summary "${RUNNER_TEMP}/monitoring-summary.md"
          --report-json "${RUNNER_TEMP}/monitoring-report.json"

      - name: Verify the update boundary
        id: boundary
        if: steps.monitor.outcome == 'success'
        run: |
          unexpected="$(git diff --name-only | grep -Ev '^(inventory/sources\.csv|inventory/sources-pending\.csv|research/horizon-source-records/HOR-[0-9]{3}-source-development\.md|areas/[A-Z]+/research/[A-Z]+-[0-9]{3}-source-development\.md)$' || true)"
          if [ -n "${unexpected}" ]; then
            printf 'Unexpected files changed:\n%s\n' "${unexpected}" >&2
            exit 1
          fi

      - name: Commit catalog updates
        id: commit
        if: steps.monitor.outcome == 'success' && steps.boundary.outcome == 'success'
        run: |
          git config user.name "arrp-case-monitor[bot]"
          git config user.email "arrp-case-monitor[bot]@users.noreply.github.com"
          mapfile -t source_development_targets < <(python -c 'import json; c=json.load(open(".github/case-monitor-bot.json")); print("\n".join(m["targetPath"] for m in c.get("sourceDevelopmentModules", []) if m.get("enabled"))) ')
          git add inventory/sources.csv inventory/sources-pending.csv "${source_development_targets[@]}"
          if git diff --cached --quiet; then
            echo "new_change=false" >> "${GITHUB_OUTPUT}"
            ahead="$(git rev-list --count "origin/${BASE_BRANCH}..HEAD")"
            if [ "${ahead}" -gt 0 ]; then
              git push --force-with-lease origin "HEAD:${BOT_BRANCH}"
              echo "needs_pr=true" >> "${GITHUB_OUTPUT}"
            else
              echo "needs_pr=false" >> "${GITHUB_OUTPUT}"
            fi
          else
            git commit -m "Record case-monitor source updates"
            git push --force-with-lease origin "HEAD:${BOT_BRANCH}"
            echo "new_change=true" >> "${GITHUB_OUTPUT}"
            echo "needs_pr=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create or update the review pull request
        if: steps.commit.outputs.needs_pr == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="$(python -c 'import json; print(json.load(open(".github/case-monitor-bot.json"))["automation"]["pullRequestTitle"])')"
          assignee="$(python -c 'import json; print(json.load(open(".github/case-monitor-bot.json"))["automation"]["assignee"])')"
          pr_number="$(gh pr list --repo "${GITHUB_REPOSITORY}" --state open --head "${BOT_BRANCH}" --json number --jq '.[0].number // empty')"
          body_file="${RUNNER_TEMP}/case-monitor-pr.md"
          printf '%s\n\n' "@${assignee}, this branch contains observable changes in cataloged court-case sources or configured machine-observed source-development leads requiring review." > "${body_file}"
          if [ "${{ steps.commit.outputs.new_change }}" != "true" ]; then
            printf '%s\n\n' "The current run found no additional changes. This pull request preserves unresolved changes staged by an earlier run; review the Files changed tab and the pending Source Monitor Log entry before merging." >> "${body_file}"
            sed 's/No repository update or pull request is needed\./No additional repository update was produced by this run; the earlier unresolved branch change remains pending./' "${RUNNER_TEMP}/monitoring-summary.md" >> "${body_file}"
          else
            cat "${RUNNER_TEMP}/monitoring-summary.md" >> "${body_file}"
          fi
          printf '\n[View the workflow run](%s)\n' "${RUN_URL}" >> "${body_file}"
          if [ -z "${pr_number}" ]; then
            pr_url="$(gh pr create --repo "${GITHUB_REPOSITORY}" --base "${BASE_BRANCH}" --head "${BOT_BRANCH}" --title "${title}" --body-file "${body_file}" --assignee "${assignee}")"
          else
            gh pr edit "${pr_number}" --repo "${GITHUB_REPOSITORY}" --title "${title}" --body-file "${body_file}" --add-assignee "${assignee}"
            pr_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/${pr_number}"
          fi
          printf '\nReview pull request: %s\n' "${pr_url}" >> "${RUNNER_TEMP}/monitoring-summary.md"

      - name: Publish the run summary
        if: always()
        run: |
          if [ -f "${RUNNER_TEMP}/monitoring-summary.md" ]; then
            cat "${RUNNER_TEMP}/monitoring-summary.md" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "## ARRP case-monitor-bot" >> "${GITHUB_STEP_SUMMARY}"
            echo >> "${GITHUB_STEP_SUMMARY}"
            echo "The monitoring script did not produce a summary. Review the failed step log." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Preserve the machine-readable report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: case-monitor-report
          path: |
            ${{ runner.temp }}/monitoring-summary.md
            ${{ runner.temp }}/monitoring-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Preserve a failed monitoring outcome
        if: always() && (steps.monitor.outcome == 'failure' || steps.boundary.outcome == 'failure')
        run: exit 1

      - name: Expose run-chain result
        id: chain-result
        if: always()
        run: |
          python3 - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          report = Path(os.environ["RUNNER_TEMP"]) / "monitoring-report.json"
          count = 0
          digest = ""
          if report.is_file():
              payload = json.loads(report.read_text())
              count = len(payload.get("changes") or [])
              count += sum(
                  len(item.get("leads") or [])
                  for item in payload.get("source_development_modules") or []
              )
              digest = "sha256:" + hashlib.sha256(report.read_bytes()).hexdigest()
          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
              output.write(f"work_count={count}\noutput_hash={digest}\n")
          PY
