name: Case monitor bot

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. This is approximately midnight Eastern:
    # 12:17 a.m. EDT and 11:17 p.m. EST.
    - cron: "17 4 * * *"

concurrency:
  group: arrp-case-monitor-bot
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Check the litigation tracker and verify changed dockets
        id: monitor
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
        run: >-
          python scripts/check_case_updates.py
          --apply
          --summary "${RUNNER_TEMP}/monitoring-summary.md"
          --report-json "${RUNNER_TEMP}/monitoring-report.json"

      - name: Verify the signal-only boundary
        id: read_only
        if: always()
        run: |
          git diff --quiet "${GITHUB_SHA}" -- .

      - name: Publish the run summary
        if: always()
        run: |
          if [ -f "${RUNNER_TEMP}/monitoring-summary.md" ]; then
            cat "${RUNNER_TEMP}/monitoring-summary.md" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "## ARRP case-monitor-bot" >> "${GITHUB_STEP_SUMMARY}"
            echo >> "${GITHUB_STEP_SUMMARY}"
            echo "The monitoring script did not produce a summary. Review the failed step log." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Preserve the machine-readable report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: case-monitor-report
          path: |
            ${{ runner.temp }}/monitoring-summary.md
            ${{ runner.temp }}/monitoring-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Notify the project owner
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notification_issue="$(python -c 'import json; print(json.load(open(".github/case-monitor-bot.json"))["notification"]["issueNumber"])')"
          notification_mention="$(python -c 'import json; print(json.load(open(".github/case-monitor-bot.json"))["notification"]["mention"])')"
          notification_body="${RUNNER_TEMP}/monitoring-notification.md"

          check_outcome="${{ steps.monitor.outcome }}"
          printf '%s\n\n' "${notification_mention} — case-monitor-bot run completed with check outcome: **${check_outcome}**." > "${notification_body}"
          if [ -f "${RUNNER_TEMP}/monitoring-summary.md" ]; then
            cat "${RUNNER_TEMP}/monitoring-summary.md" >> "${notification_body}"
          else
            printf '%s\n' "The monitoring check did not produce a summary. Review the workflow log." >> "${notification_body}"
          fi
          printf '\n**Repository changes:** None. This monitoring workflow is signal-only and read-only.\n' >> "${notification_body}"
          printf '\n[View this GitHub Actions run](%s/%s/actions/runs/%s)\n' "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}" >> "${notification_body}"

          gh issue comment "${notification_issue}" --repo "${GITHUB_REPOSITORY}" --body-file "${notification_body}"

      - name: Preserve a failed monitoring outcome
        if: always() && (steps.monitor.outcome == 'failure' || steps.read_only.outcome == 'failure')
        run: exit 1
