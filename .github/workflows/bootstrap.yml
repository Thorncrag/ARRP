name: Bootstrap ARRP repository

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract canonical project files
        shell: bash
        run: |
          cat .bootstrap/part-* > /tmp/arrp_payload.b64
          base64 --decode /tmp/arrp_payload.b64 > /tmp/arrp_payload.tar.gz
          tar -xzf /tmp/arrp_payload.tar.gz -C .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml
      - name: Commit initialized project
        shell: bash
        run: |
          git config user.name "ARRP Bootstrap"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Initialize ARRP canonical project structure"
          git push
