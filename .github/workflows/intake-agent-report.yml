name: Intake agent report (manual)

on:
  workflow_dispatch:
    inputs:
      comment_id:
        description: Numeric GitHub Discussion comment ID from the public-submission URL
        required: true
        type: string
      discussion_number:
        description: GitHub Discussion number from the public-submission URL
        required: true
        type: string

permissions:
  contents: read
  discussions: read

jobs:
  assess:
    name: Generate report-only assessment
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_INTAKE_API_KEY }}
      OPENAI_INTAKE_MODEL: ${{ vars.OPENAI_INTAKE_MODEL }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Check out the process definition
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Generate report-only assessment
        env:
          COMMENT_ID: ${{ inputs.comment_id }}
          DISCUSSION_NUMBER: ${{ inputs.discussion_number }}
        run: node scripts/assess_intake_discussion.mjs --comment-id "$COMMENT_ID" --discussion-number "$DISCUSSION_NUMBER" --output intake-agent-artifact/assessment.json

      - name: Retain maintainer report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: intake-agent-report-${{ inputs.comment_id }}
          path: intake-agent-artifact/assessment.json
          if-no-files-found: error
          retention-days: 14
