name: Check monitored external developments

on:
  workflow_dispatch:
  schedule:
    - cron: "43 11 * * *"

concurrency:
  group: arrp-monitoring-pilot
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Check configured monitoring records
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python scripts/check_monitoring_updates.py
          --apply
          --summary "${RUNNER_TEMP}/monitoring-summary.md"
          --report-json "${RUNNER_TEMP}/monitoring-report.json"

      - name: Publish the run summary
        if: always()
        run: |
          if [ -f "${RUNNER_TEMP}/monitoring-summary.md" ]; then
            cat "${RUNNER_TEMP}/monitoring-summary.md" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "## ARRP automated monitoring pilot" >> "${GITHUB_STEP_SUMMARY}"
            echo >> "${GITHUB_STEP_SUMMARY}"
            echo "The monitoring script did not produce a summary. Review the failed step log." >> "${GITHUB_STEP_SUMMARY}"
          fi
