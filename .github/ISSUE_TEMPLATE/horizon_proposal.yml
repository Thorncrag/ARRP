name: Horizon proposal
description: Suggest a new or emerging institutional-risk concern for ARRP review.
title: "HOR: "
labels:
  - "kind: horizon"
body:
  - type: markdown
    attributes:
      value: |
        Use this form for a new concern that may belong in the Horizon Scan. If accepted for formal review, maintainers will assign a static HOR-### identifier, track active status in GitHub, and preserve final disposition in framework/HORIZON_SCAN_LOG.md.
  - type: textarea
    id: concern
    attributes:
      label: Proposed concern
      description: Describe the institutional weakness, abuse pattern, or democratic-resilience concern.
      placeholder: What should ARRP consider, and why does it matter?
    validations:
      required: true
  - type: textarea
    id: overlap
    attributes:
      label: Existing ARRP overlap
      description: List any related ARRP areas, issues, horizon items, or source records if known.
      placeholder: Example: A-02, ELEC-010, HOR-020, or unknown.
    validations:
      required: false
  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: Provide primary sources, court records, statutes, official materials, or reliable reporting.
      placeholder: Links and short notes are both helpful.
    validations:
      required: true
  - type: textarea
    id: remedy
    attributes:
      label: Possible remedy direction
      description: If you have one, describe the legal, statutory, constitutional, procedural, or governance repair that might fit.
      placeholder: It is fine to say that the remedy is unknown.
    validations:
      required: false
  - type: textarea
    id: why-not-covered
    attributes:
      label: Why existing proposals may not cover it
      description: Explain why this concern may need a new horizon item, a new issue, or a distinct merge decision.
    validations:
      required: false
