<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="680" viewBox="0 0 1000 680" role="img" aria-labelledby="title desc">
  <title id="title">Maine RCV participation trend by election series</title>
  <desc id="desc">Two line charts separating regular primaries, midterm general elections, and presidential-year general elections so unlike election environments are not connected into one trend line.</desc>
